services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: courtiq
      POSTGRES_USER: courtiq
      POSTGRES_PASSWORD: courtiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtiq -d courtiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://courtiq:courtiq@db:5432/courtiq
      JWT_SECRET_KEY: local-dev-secret-change-before-deploy
      LOCAL_UPLOAD_DIR: /app/backend/local_uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/backend/local_uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
    depends_on:
      - backend
    ports:
      - "5173:4173"

volumes:
  postgres_data:
  backend_uploads:
